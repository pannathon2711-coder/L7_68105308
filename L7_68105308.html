<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS7 68105308 Pannathon Phetthong</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="L7.CSS"></head>
<body>

  
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ᴘᴀɴɴᴀᴛʜᴏɴ ᴘʜᴇᴛᴛʜᴏɴɢ</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">ข้อมูลบริษัท</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">บริการ</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">เกี่ยวกับเรา</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Video Header -->
    <header class="video-header position-relative">
        <video autoplay loop muted playsinline class="w-100">
            <source src="รร.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="video-overlay">
    <button class="btn btn-warning btn-sm">Play</button>
    <button class="btn btn-danger btn-sm">Pause</button>
</div>
    </header>

    <!-- Form -->
    <div class="container mt-5">
        <div class="mx-auto" style="max-width: 400px;">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white text-center">
                    <h6 class="mb-0">แบบฟอร์มลงทะเบียน</h6>
                </div>

                <div class="card-body">
                    <form>
                        <div class="mb-2">
                            <label class="form-label small">ชื่อ-นามสกุล:</label>
                            <input type="text" class="form-control form-control-sm" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small">อีเมล:</label>
                            <input type="email" class="form-control form-control-sm" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small">รหัสผ่าน:</label>
                            <input type="password" class="form-control form-control-sm" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small d-block">เพศ:</label>

                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male">
                                <label class="form-check-label small" for="male">ชาย</label>
                            </div>

                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female">
                                <label class="form-check-label small" for="female">หญิง</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small">ตำแหน่ง:</label>
                            <select class="form-select form-select-sm">
                                <option selected disabled>เลือกตำแหน่ง</option>
                                <option>Manager</option>
                                <option>Developer</option>
                                <option>Designer</option>
                                <option>Marketing</option>

                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-success btn-sm">ลงทะเบียน</button>
                            <button type="reset" class="btn btn-danger btn-sm">ล้างข้อมูล</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (สำคัญมาก!) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
